<div class="page-section">
  <div class="section-header">
    <div class="title-group">
      <h2 class="section-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="24" height="24">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9" />
          <path d="M13.73 21a2 2 0 0 1-3.46 0" />
        </svg>
        Notifications
        <span class="notif-count" *ngIf="nonLus > 0">{{ nonLus }}</span>
      </h2>
    </div>
    <button class="btn-tout-lire" *ngIf="nonLus > 0" (click)="toutLire()">
      Tout marquer comme lu
    </button>
  </div>

  <div *ngIf="loading" class="loading-card">
    <div class="spinner"></div>
    <p>Chargement de vos notifications...</p>
  </div>

  <div *ngIf="!loading && notifs.length === 0" class="empty-card">
    <span>🔕</span>
    <h3>Aucune notification</h3>
    <p>Vous êtes à jour ! Nous vous préviendrons dès qu'il y aura du nouveau.</p>
  </div>

  <div class="notifs-list" *ngIf="!loading && notifs.length > 0">
    <div class="notif-item" *ngFor="let n of notifs" [class.non-lu]="!n.lu" (click)="!n.lu && marquerLu(n.id_notification)">
      <div class="notif-dot" [class.unread]="!n.lu"></div>
      <div class="notif-content">
        <p class="notif-msg">{{ n.message }}</p>
        <p class="notif-date">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="12" height="12" style="vertical-align: middle; margin-right: 4px;">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          {{ n.date_envoi | date:'dd/MM/yyyy HH:mm' }}
        </p>
      </div>
      <span class="new-tag" *ngIf="!n.lu">Nouveau</span>
    </div>
  </div>
</div>
