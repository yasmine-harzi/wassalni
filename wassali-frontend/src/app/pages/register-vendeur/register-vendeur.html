<div class="form-container">
  <h2>Inscription Vendeur</h2>
  
  <form [formGroup]="vendeurForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label>Nom</label>
      <input type="text" formControlName="nom" placeholder="Ex: Ben Ali">
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="exemple@mail.com">
    </div>

    <button type="submit" ="!vendeurForm.valid">
      S'inscrire
    </button>
    
  </form>
</div>
