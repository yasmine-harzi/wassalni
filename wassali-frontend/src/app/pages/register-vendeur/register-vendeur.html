<div class="register-container">
  <h2>Inscription Vendeur</h2>

  <form [formGroup]="vendeurForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" formControlName="nom" placeholder="Ex: Ben Ali">
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" formControlName="prenom" placeholder="Ex: Ahmed">
      </div>
    </div>

    <div class="form-group">
      <label>Email boutique</label>
      <input type="email" formControlName="email" placeholder="boutique@mail.com">
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" formControlName="password">
    </div>

    <div class="form-group">
      <label>Nom de l'entreprise / Boutique</label>
      <input type="text" formControlName="nom_entreprise" placeholder="Ex: Wassali Shop">
    </div>

    <div class="form-group">
      <label>Adresse de l'entreprise</label>
      <input type="text" formControlName="adresse_entreprise" placeholder="Ex: Rue 123, Tunis">
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" formControlName="telephone" placeholder="Ex: 22 111 222">
    </div>

    <button type="submit" [disabled]="!vendeurForm.valid">Ouvrir ma boutique</button>
  </form>

  <div class="login-redirect">
    <p>Vous avez déjà un compte ?</p>
    <button type="button" class="btn-link" routerLink="#">Se connecter</button>
  </div>
</div>
