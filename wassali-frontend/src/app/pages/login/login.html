<div class="login-page">
  <div class="login-card">
    <div class="brand" routerLink="/" style="cursor: pointer;">
      <span class="gear-icon">⚙</span>
      <span class="brand-name">WASSALI</span>
    </div>
    <h1>Connexion </h1>
    <p class="subtitle">Gérez vos livraisons en temps réel</p>

    <div class="error-banner" *ngIf="error()">
      <span>⚠ {{ error() }}</span>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="votre@email.com" />
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" [(ngModel)]="password" placeholder="••••••••" (keyup.enter)="onSubmit()" />
    </div>

    <button class="btn-login" (click)="onSubmit()" [disabled]="loading()">
      <span *ngIf="!loading()">Se connecter</span>
      <span *ngIf="loading()" class="spinner">⟳</span>
    </button>
  </div>
</div>
