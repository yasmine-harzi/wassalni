<div class="login-container" id="flash">
  <h2>Connexion WASSALI</h2>

  <form (ngSubmit)="login()">
    <input 
      type="email" 
      id = "email"
      [(ngModel)]="email" 
      name="email" 
      placeholder="Email" 
      required
      [disabled]="isLoading"
    >
    
    <input 
      type="password" 
      id = "password"
      [(ngModel)]="password" 
      name="password" 
      placeholder="Mot de passe" 
      required
      [disabled]="isLoading"
    >

    <button type="submit" [disabled]="isLoading">
      {{ isLoading ? '⏳ Connexion en cours...' : 'Se connecter' }}
    </button>
  </form>

  <p *ngIf="error" class="error-message" >{{ error }}</p>
</div>
