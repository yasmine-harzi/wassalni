<div class="register-container">
  <h2>Inscription Coursier</h2>
  
  <form [formGroup]="coursierForm" (ngSubmit)="onSubmit()" class="registration-card">

    <div class="row">
      <div class="col-md-6 mb-4 position-relative">
        <label class="form-label">Nom</label>
        <input type="text" formControlName="nom" class="form-control custom-input" placeholder="Ex: Dupont" required>
        <div class="feedback-text">Le nom est obligatoire</div>
      </div>

      <div class="col-md-6 mb-4 position-relative">
        <label class="form-label">Prénom</label>
        <input type="text" formControlName="prenom" class="form-control custom-input" placeholder="Ex: Jean" required>
        <div class="feedback-text">Le prénom est obligatoire</div>
      </div>
    </div>

    <div class="mb-4 position-relative">
      <label class="form-label">Adresse Email</label>
      <input type="email" formControlName="email" class="form-control custom-input" placeholder="nom@exemple.com" required>
      <div class="feedback-text">Format d'email invalide (ex: nom@mail.com)</div>
    </div>

    <div class="mb-4 position-relative">
      <label class="form-label">Mot de passe</label>
      <input type="password" formControlName="password" class="form-control custom-input" placeholder="••••••••" required minlength="6">
      <div class="feedback-text">Minimum 6 caractères requis</div>
    </div>

    <div class="mb-4 position-relative">
      <label class="form-label">Téléphone</label>
      <input type="tel" formControlName="telephone" class="form-control custom-input" placeholder="Ex: +216 22 123 456" required>
      <div class="feedback-text">Numéro de téléphone requis</div>
    </div>

    <div class="mb-4 position-relative">
      <label class="form-label">Adresse de résidence</label>
      <input type="text" formControlName="adresse" class="form-control custom-input" placeholder="Ex: Rue de la Liberté, Tunis" required>
      <div class="feedback-text">L'adresse est nécessaire</div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label>Type de Véhicule</label>
        <select formControlName="vehicule" required>
          <option value="" disabled selected>Choisir un véhicule</option>
          <option value="moto">Moto / Scooter</option>
          <option value="velo">Vélo</option>
          <option value="voiture">Voiture</option>
          <option value="camionnette">Camionnette</option>
        </select>
        <div class="feedback-text">Veuillez choisir une option</div>
      </div>

      <div class="form-group">
        <label>N° Permis / CIN</label>
        <input type="text" formControlName="permis" placeholder=" " required>
        <div class="feedback-text">Numéro officiel requis</div>
      </div>
    </div>

    

    <div class="form-group">
      <label>Zone de livraison (Ville)</label>
      <input type="text" formControlName="zone_livraison" placeholder=" " required>
      <div class="feedback-text">Ex: Tunis, Ariana...</div>
    </div>

    <button type="submit" [disabled]="!coursierForm.valid">Devenir Coursier</button>
  </form>
</div>
