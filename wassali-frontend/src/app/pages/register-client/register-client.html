<div class="register-container">
  <h2>Inscription Client</h2>

  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" formControlName="nom">
      </div>
      <div class="form-group">
        <label>Prénom</label>
        <input type="text" formControlName="prenom">
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email">
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" formControlName="password">
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" formControlName="telephone">
    </div>

    <div class="form-group">
      <label>Adresse</label>
      <input type="text" formControlName="adresse">
    </div>

    <div class="form-group">
      <label>Vous êtes :</label>
      <select formControlName="type_client">
        <option value="particulier">Un Particulier</option>
        <option value="entreprise">Une Entreprise</option>
      </select>
    </div>

    <button type="submit" [disabled]="!registerForm.valid">S'inscrire</button>
  </form>

  <div class="login-redirect">
    <p>Déjà un compte ?</p>
    <button type="button" class="btn-link" routerLink="">Se connecter</button>
  </div>
</div>
