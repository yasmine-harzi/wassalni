<div class="register-container">
  <h2>Inscription Client</h2>
  
  <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
    
    <div class="form-row">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" formControlName="nom" placeholder="Votre nom">
        <div class="feedback-text">
          <span *ngIf="registerForm.get('nom')?.touched && registerForm.get('nom')?.invalid">Nom requis</span>
        </div>
      </div>

      <div class="form-group">
        <label>Prénom</label>
        <input type="text" formControlName="prenom" placeholder="Votre prénom">
        <div class="feedback-text">
          <span *ngIf="registerForm.get('prenom')?.touched && registerForm.get('prenom')?.invalid">Prénom requis</span>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" formControlName="email" placeholder="exemple@gmail.com">
      <div class="feedback-text">
        <span *ngIf="registerForm.get('email')?.touched && registerForm.get('email')?.hasError('required')">L'email est obligatoire.</span>
        <span *ngIf="registerForm.get('email')?.dirty && registerForm.get('email')?.hasError('pattern')">L'adresse doit être un @gmail.com valide.</span>
      </div>
    </div>

    <div class="form-group">
      <label>Mot de passe</label>
      <input type="password" formControlName="password" placeholder="********">
      <div class="feedback-text">
        <span *ngIf="registerForm.get('password')?.touched && registerForm.get('password')?.hasError('required')">Mot de passe requis.</span>
        <span *ngIf="registerForm.get('password')?.dirty && (registerForm.get('password')?.invalid && !registerForm.get('password')?.hasError('required'))">
          8+ car. (1 Maj, 1 Chiffre, 1 Symbole)
        </span>
      </div>
    </div>

    <div class="form-group">
      <label>Téléphone</label>
      <input type="text" formControlName="telephone" placeholder="Ex: 21654321">
      <div class="feedback-text">
        <span *ngIf="registerForm.get('telephone')?.touched && registerForm.get('telephone')?.hasError('required')">Numéro requis.</span>
        <span *ngIf="registerForm.get('telephone')?.dirty && registerForm.get('telephone')?.hasError('pattern')">Doit contenir 8 chiffres.</span>
      </div>
    </div>

    <div class="form-group">
      <label>Adresse</label>
      <input type="text" formControlName="adresse" placeholder="Adresse complète">
      <div class="feedback-text">
        <span *ngIf="registerForm.get('adresse')?.touched && registerForm.get('adresse')?.invalid">L'adresse de livraison est requise.</span>
      </div>
    </div>

    <div class="form-group">
      <label>Vous êtes :</label>
      <select formControlName="type_client">
        <option value="particulier">Un Particulier</option>
        <option value="entreprise">Une Entreprise</option>
      </select>
    </div>

    <button type="submit" [disabled]="registerForm.invalid">S'inscrire</button>
  </form>
</div>
